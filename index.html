<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>$ Dollar Gravity Framework — Einstein Fabric Planetary Visual</title>
    <meta name="description" content="Interactive 3D planetary model of USD gravity: countries as planets/moons with colored gravity fields for money, power, military. Zoom, click for details.">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/paulmasson/threejs-with-controls@r121/build/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: monospace; color: #ccc; }
        #canvas { position: absolute; top: 0; left: 0; }
        #ui { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px; max-width: 300px; z-index: 100; }
        #info { position: absolute; bottom: 20px; left: 20px; background: rgba(0,0,0,0.8); padding: 15px; border-radius: 8px; display: none; max-width: 400px; }
        .planet { cursor: pointer; }
    </style>
</head>
<body>
    <div id="ui">
        <h2 style="color:#f5ce0b; margin:0 0 10px;">💵 Dollar Gravity</h2>
        <p>Einstein Fabric: Drag to orbit • Scroll to zoom • Click planets</p>
        <button onclick="resetCamera()" style="background:#f5ce0b; color:#000; border:none; padding:8px 12px; cursor:pointer;">Reset View</button>
        <div style="margin-top:10px; font-size:0.9em;">Mid-2026 Snapshot • Static Data</div>
    </div>
    <div id="info"></div>
    <script>
        // Three.js setup
        let scene, camera, renderer, controls;
        let planets = [];
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 50, 100);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);
            renderer.domElement.id = 'canvas';

            // Lights
            const ambient = new THREE.AmbientLight(0x404040);
            scene.add(ambient);
            const sunLight = new THREE.PointLight(0xffffff, 2, 0);
            sunLight.position.set(0, 0, 0);
            scene.add(sunLight);

            // USD Core (Sun)
            const coreGeo = new THREE.SphereGeometry(8, 32, 32);
            const coreMat = new THREE.MeshBasicMaterial({ color: 0xf5ce0b });
            const usdCore = new THREE.Mesh(coreGeo, coreMat);
            scene.add(usdCore);
            planets.push({mesh: usdCore, name: 'USD Core', info: 'Central mass. ~7.8T reserves/settlements. Pulls all orbits.'});

            // Example Planets (expandable to 195)
            createPlanet('USA', 25, 0x00aaff, 0, 0, 'Superpower. Strong military halo, elite networks.');
            createPlanet('China', 20, 0xff4444, 40, 0, 'Rising rival. Trade entanglement + bypass arcs.');
            createPlanet('EU', 15, 0x44ff44, -35, 20, 'Allied cluster. Security guarantees.');
            createPlanet('Russia', 12, 0xaa44ff, 55, -15, 'Nuclear halo, energy flows.');
            // Add more as needed...

            // Stars background
            const starsGeo = new THREE.BufferGeometry();
            const starsCount = 5000;
            const positions = new Float32Array(starsCount * 3);
            for(let i=0; i<starsCount*3; i++) positions[i] = (Math.random()-0.5)*400;
            starsGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            const starsMat = new THREE.PointsMaterial({color: 0xffffff, size: 0.7});
            const stars = new THREE.Points(starsGeo, starsMat);
            scene.add(stars);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;

            window.addEventListener('resize', onWindowResize);
            renderer.domElement.addEventListener('click', onClick);

            animate();
        }

        function createPlanet(name, size, color, x, z, info) {
            const geo = new THREE.SphereGeometry(size, 32, 32);
            const mat = new THREE.MeshPhongMaterial({ color: color, emissive: color, emissiveIntensity: 0.3 });
            const planet = new THREE.Mesh(geo, mat);
            planet.position.set(x, 0, z);
            planet.userData = {name, info};
            scene.add(planet);
            planets.push({mesh: planet, name, info});

            // Gravity field (ring)
            const ringGeo = new THREE.RingGeometry(size*1.8, size*2.2, 64);
            const ringMat = new THREE.MeshBasicMaterial({ color: 0x88ccff, side: THREE.DoubleSide, transparent: true, opacity: 0.25 });
            const ring = new THREE.Mesh(ringGeo, ringMat);
            ring.rotation.x = Math.PI / 2;
            planet.add(ring);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function onClick(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(scene.children, true);

            if (intersects.length > 0) {
                let obj = intersects[0].object;
                while (obj && !obj.userData.name) obj = obj.parent;
                if (obj && obj.userData.name) {
                    showInfo(obj.userData);
                }
            }
        }

        function showInfo(data) {
            const infoEl = document.getElementById('info');
            infoEl.innerHTML = `<h3>${data.name}</h3><p>${data.info}</p><p><strong>Allies:</strong> NATO/EU partners (example)</p><p><strong>Enemies/Rivals:</strong> Geopolitical tensions</p><p><strong>Money Flow:</strong> High USD dependency</p><p><strong>Military:</strong> Strong halo</p><small>Click elsewhere to close. Data: Mid-2026 static snapshot.</small>`;
            infoEl.style.display = 'block';
        }

        function resetCamera() {
            camera.position.set(0, 50, 100);
            controls.target.set(0,0,0);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            // Gentle rotation for planets
            planets.forEach(p => {
                if (p.mesh !== planets[0].mesh) p.mesh.rotation.y += 0.001;
            });
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
