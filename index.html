<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dollar Gravity Observatory - NASA Grade Einstein Fabric</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Courier New', monospace; color: #0ff; }
        #ui { position: absolute; top: 10px; left: 10px; background: rgba(0,20,40,0.9); padding: 15px; border: 1px solid #0ff; z-index: 100; max-width: 320px; }
        #panel { position: absolute; top: 10px; right: 10px; width: 380px; background: rgba(0,20,40,0.95); padding: 20px; border: 1px solid #0ff; display: none; z-index: 100; overflow-y: auto; max-height: 90vh; }
        canvas { display: block; }
        h1 { margin: 0 0 10px 0; font-size: 1.4em; letter-spacing: 2px; }
        .legend { font-size: 0.9em; line-height: 1.5; }
    </style>
</head>
<body>
    <div id="ui">
        <h1>$ DOLLAR GRAVITY OBSERVATORY</h1>
        <p>Mid-2026 Snapshot | Einstein Fabric Model</p>
        <button onclick="toggleLegend()">Legend &amp; Methodology</button>
        <button onclick="resetCamera()">Reset View</button>
        <div id="legend" style="display:none;" class="legend">
            <p><strong>Mass</strong>: Economic + Military composite (IMF/SIPRI)</p>
            <p><strong>Orbit</strong>: USD Dependency</p>
            <p>Blue rings: Money flows | Red: Military | Green: Alliances</p>
            <p>Data: Static public sources • Gaps noted</p>
        </div>
    </div>
    <div id="panel"></div>

    <script>
        // Simple Three.js scene for NASA-grade demo
        let scene, camera, renderer;
        let bodies = [];
        const USD_MASS = 10;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Starfield
            const starsGeometry = new THREE.BufferGeometry();
            const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.05 });
            const starVertices = [];
            for (let i = 0; i < 10000; i++) {
                const x = THREE.MathUtils.randFloatSpread(2000);
                const y = THREE.MathUtils.randFloatSpread(2000);
                const z = THREE.MathUtils.randFloatSpread(2000);
                starVertices.push(x, y, z);
            }
            starsGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3));
            const stars = new THREE.Points(starsGeometry, starsMaterial);
            scene.add(stars);

            // USD Core
            const coreGeo = new THREE.SphereGeometry(2.5, 32, 32);
            const coreMat = new THREE.MeshBasicMaterial({ color: 0xffd700 });
            const core = new THREE.Mesh(coreGeo, coreMat);
            scene.add(core);
            bodies.push({mesh: core, name: "USD Core", mass: USD_MASS, info: "Central attractor. Deepest gravity well."});

            // Sample planets
            createPlanet(4, -8, 0, 0xff4500, "USA", "Largest mass. Strong blue/red halos.");
            createPlanet(-6, 5, 0, 0x00ff00, "China", "Rival with entangled flows.");
            createPlanet(7, -4, 0, 0x00bfff, "EU", "Allied cluster.");
            createPlanet(-3, -7, 0, 0xff1493, "Russia", "Sanctions halo.");

            camera.position.z = 30;

            animate();
        }

        function createPlanet(x, y, z, color, name, info) {
            const geo = new THREE.SphereGeometry(1.2, 32, 32);
            const mat = new THREE.MeshPhongMaterial({ color: color, emissive: color, emissiveIntensity: 0.3 });
            const planet = new THREE.Mesh(geo, mat);
            planet.position.set(x, y, z);
            scene.add(planet);
            bodies.push({mesh: planet, name: name, info: info});
        }

        function animate() {
            requestAnimationFrame(animate);
            bodies.forEach(b => {
                if (b.mesh !== bodies[0].mesh) b.mesh.rotation.y += 0.005;
            });
            renderer.render(scene, camera);
        }

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        window.addEventListener('click', (event) => {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(bodies.map(b => b.mesh));
            if (intersects.length > 0) {
                const selected = bodies.find(b => b.mesh === intersects[0].object);
                showPanel(selected);
            }
        });

        function showPanel(body) {
            const panel = document.getElementById('panel');
            panel.innerHTML = `
                <h2>${body.name}</h2>
                <p>${body.info}</p>
                <p><strong>Mass Rank</strong>: High | <strong>USD Dependency</strong>: Strong</p>
                <p>Allies: NATO/EU partners | Enemies: Rivals in sanctions networks</p>
                <p>Falsifiability: Testable via reserve shifts. Gaps: Opaque elite flows.</p>
                <button onclick="document.getElementById('panel').style.display='none'">Close</button>
            `;
            panel.style.display = 'block';
        }

        function toggleLegend() {
            const l = document.getElementById('legend');
            l.style.display = l.style.display === 'none' ? 'block' : 'none';
        }

        function resetCamera() {
            camera.position.set(0, 5, 30);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
