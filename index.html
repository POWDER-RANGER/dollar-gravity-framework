    // 3D GRAVITY FABRIC Component
    const GravityFabric = ({ countries, warpIntensity, visible }) => {
      const fabricRef = useRef();
      const resolution = 100; // Grid resolution
      const size = 120; // Fabric size

      // Create custom geometry with warping
      const geometry = useMemo(() => {
        const geo = new THREE.PlaneGeometry(size, size, resolution, resolution);
        return geo;
      }, [size, resolution]);

      useFrame(({ clock }) => {
        if (!fabricRef.current || !visible) return;
        const positions = fabricRef.current.geometry.attributes.position;
        const time = clock.getElapsedTime();

        for (let i = 0; i < positions.count; i++) {
          const x = positions.getX(i);
          const z = positions.getZ(i);
          let y = 0;

          // Warp based on planet masses and distances
          countries.forEach(country => {
            const [px, py, pz] = country.position;
            const dist = Math.sqrt((x - px) ** 2 + (z - pz) ** 2);
            if (dist > 0.5) {
              // Gravitational warp: deeper for higher mass, inverse square
              y -= (country.mass * 8 * warpIntensity) / (dist * dist + 1);
            }
          });

          // Add subtle ripple animation
          y += Math.sin(time * 0.3 + x * 0.15) * 0.3 + Math.cos(time * 0.25 + z * 0.15) * 0.3;

          positions.setY(i, y);
        }
        positions.needsUpdate = true;
      });

      if (!visible) return null;

      return (
        <mesh ref={fabricRef} rotation={[-Math.PI / 2, 0, 0]} position={[0, -18, 0]} geometry={geometry}>
          <meshStandardMaterial
            color="#0a3a5c"
            wireframe={false}
            transparent
            opacity={0.35}
            side={THREE.DoubleSide}
            emissive="#004d73"
            emissiveIntensity={0.3}
          />
        </mesh>
      );
    };

      const haloRef = useRef();
      const [hovered, setHovered] = useState(false);

      useFrame(({ clock }) => {
        if (!meshRef.current) return;
        meshRef.current.rotation.y += 0.002;
        if (data.nuclear > 0 && haloRef.current) {
          const t = clock.getElapsedTime();
          const s = 1 + Math.sin(t * 1.5) * 0.06;
          haloRef.current.scale.set(s, s, s);
        }
      });

          onClick={onClick}
          onPointerOver={(e) => { e.stopPropagation(); setHovered(true); }}
          onPointerOut={(e) => { e.stopPropagation(); setHovered(false); }}

        const from = new THREE.Vector3(...fromPos);
        const to = new THREE.Vector3(...toPos);
        return [from, to];
      }, [fromPos, toPos]);

      return (
        <line ref={lineRef}>
          <bufferGeometry>
            <bufferAttribute
              attach="attributes-position"
              count={points.length}
              array={new Float32Array(points.flatMap(p => [p.x, p.y, p.z]))}

            />
          ))}

          {relationships.map((rel, i) => (
            <GravityLine
              key={i}
              fromPos={positions[rel.from]}
              toPos={positions[rel.to]}
              color={rel.color}
              dashed={rel.dashed}
              pulse={rel.pulse && (rel.type === 'isr' ? isrIntensity > 0.5 : true)}
            />
          ))}

          {selected && (
            <Html fullscreen>
              <div
                onClick={() => setSelected(null)}
                style={{
                  position: 'absolute',
                  inset: 0,
                  display: 'flex',
                  alignItems: 'flex-end',
                  justifyContent: 'center',
                  background: 'radial-gradient(circle at top, rgba(15,23,42,0.75), rgba(0,0,0,0.96))',
                  pointerEvents: 'auto',
                }}
              >
                <div
                  onClick={(e) => e.stopPropagation()}
                  style={{
                    width: '100%',
                    maxWidth: 520,
                    margin: 28,
                    padding: 24,
                    borderRadius: 16,
                    background: 'rgba(15,23,42,0.97)',
                    border: '1px solid rgba(148,163,184,0.45)',
                    boxShadow: '0 28px 70px rgba(0,0,0,0.9)',
                    color: '#e5e7eb',
                  }}
                >
                  <h2 style={{ fontSize: 22, fontWeight: 600, marginBottom: 10 }}>{selected.name}</h2>
                  <p style={{ fontSize: 14, color: '#9ca3af', marginBottom: 18 }}>
                    Strategic profile: power mass, threat posture, dollar integration, nuclear status.
                  </p>
                  <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, minmax(0, 1fr))', gap: 14, marginBottom: 18 }}>
                    <div style={{ padding: 12, borderRadius: 12, background: 'rgba(15,118,110,0.14)', border: '1px solid rgba(45,212,191,0.4)' }}>
                      <div style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: 1.8, color: '#a5b4fc' }}>GFP Rank</div>
                      <div style={{ fontSize: 20, fontWeight: 600 }}>#{selected.rank}</div>
                    </div>
                    <div style={{ padding: 12, borderRadius: 12, background: 'rgba(15,118,110,0.14)', border: '1px solid rgba(45,212,191,0.4)' }}>
                      <div style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: 1.8, color: '#a5b4fc' }}>Power Mass</div>
                      <div style={{ fontSize: 20, fontWeight: 600 }}>{selected.mass.toFixed(2)}</div>
                    </div>
                    <div style={{ padding: 12, borderRadius: 12, background: 'rgba(190,24,93,0.12)', border: '1px solid rgba(244,114,182,0.45)' }}>
                      <div style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: 1.8, color: '#f9a8d4' }}>Nuclear</div>
                      <div style={{ fontSize: 20, fontWeight: 600 }}>{selected.nuclear ? selected.nuclear.toLocaleString() : 'None'}</div>
                    </div>
                    <div style={{ padding: 12, borderRadius: 12, background: 'rgba(59,130,246,0.14)', border: '1px solid rgba(96,165,250,0.55)' }}>
                      <div style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: 1.8, color: '#bfdbfe' }}>Threat</div>
                      <div style={{ fontSize: 20, fontWeight: 600 }}>{(selected.threat * 100).toFixed(0)}%</div>
                    </div>
                  </div>
                  <div style={{ padding: 12, borderRadius: 12, background: 'rgba(245,158,11,0.16)', border: '1px solid rgba(251,191,36,0.65)', marginBottom: 16 }}>
                    <div style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: 1.8, color: '#fed7aa', marginBottom: 4 }}>Dollar Dependency</div>
                    <div style={{ fontSize: 20, fontWeight: 600 }}>{(selected.usdDep * 100).toFixed(0)}%</div>
                  </div>
                  <button
                    onClick={() => setSelected(null)}
                    style={{
                      marginTop: 6,
                      fontSize: 14,
                      padding: '8px 16px',
                      borderRadius: 9999,
                      border: '1px solid rgba(148,163,184,0.65)',
                      background: 'rgba(15,23,42,0.95)',
                      color: '#e5e7eb',
                      cursor: 'pointer',
                    }}
                  >
                    Close
                  </button>
                </div>
              </div>
            </Html>
          )}
        </>
      );
    };

    const App = () => {
      const [isrIntensity, setIsrIntensity] = useState(1.0);
      const [dollarPull, setDollarPull] = useState(1.0);
      const [warpIntensity, setWarpIntensity] = useState(0.6);
      const [fabricVisible, setFabricVisible] = useState(true);

      useEffect(() => {
        const isrSlider = document.getElementById('isr-slider');
        const dollarSlider = document.getElementById('dollar-slider');
        const warpSlider = document.getElementById('warp-slider');
        const fabricToggle = document.getElementById('fabric-toggle');
        const resetBtn = document.getElementById('reset-btn');
        const scenarioBtn = document.getElementById('scenario-btn');

        isrSlider.addEventListener('input', (e) => {
          const val = e.target.value / 100;
          setIsrIntensity(val);
          document.getElementById('isr-value').textContent = `${e.target.value}%`;
        });

        dollarSlider.addEventListener('input', (e) => {
          const val = e.target.value / 100;
          setDollarPull(val);
          document.getElementById('dollar-value').textContent = `${e.target.value}%`;
        });

        warpSlider.addEventListener('input', (e) => {
          const val = e.target.value / 100;
          setWarpIntensity(val);
          document.getElementById('warp-value').textContent = `${e.target.value}%`;
        });

        fabricToggle.addEventListener('change', (e) => {
          setFabricVisible(e.target.checked);
        });

        resetBtn.addEventListener('click', () => {
          setIsrIntensity(1.0);
          setDollarPull(1.0);
          setWarpIntensity(0.6);
          setFabricVisible(true);
          isrSlider.value = 100;
          dollarSlider.value = 100;
          warpSlider.value = 60;
          fabricToggle.checked = true;
          document.getElementById('isr-value').textContent = '100%';
          document.getElementById('dollar-value').textContent = '100%';
          document.getElementById('warp-value').textContent = '60%';
        });

        scenarioBtn.addEventListener('click', () => {
          // Iran breakout scenario
          setIsrIntensity(0.3);
          isrSlider.value = 30;
          document.getElementById('isr-value').textContent = '30%';
          alert('Iran Breakout Scenario: ISR cut to 30%, Iran forms deeper warp (nuclear acquisition)');
        });
      }, []);

      return (
        <div style={{ width: '100vw', height: '100vh', background: 'radial-gradient(circle at top, #020617, #000000)' }}>
          <Canvas camera={{ position: [0, 15, 70], fov: 65 }} shadows>
            <color attach="background" args={['#020617']} />
            <ambientLight intensity={0.6} />
            <pointLight position={[30, 30, 30]} intensity={1.4} />
            <pointLight position={[-25, -20, -15]} intensity={0.8} color="#60a5fa" />
            <OrbitControls enablePan enableZoom enableRotate maxDistance={180} minDistance={8} />
            <GalaxyScene
              isrIntensity={isrIntensity}
              dollarPull={dollarPull}
              warpIntensity={warpIntensity}
              fabricVisible={fabricVisible}
            />
          </Canvas>
        </div>
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
